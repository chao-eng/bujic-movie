version: "3.8"
services:
  bujic-movie:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    container_name: bujic-movie
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data                # 配置 + SQLite 数据库
      - /path/to/media:/media           # 媒体库挂载
      - /path/to/downloads:/downloads   # 下载目录挂载
    environment:
      - TZ=Asia/Shanghai
