<svg width="220" height="220" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- 品牌容器（更像 YouTube/Netflix 的柔和卡片） -->
  <rect x="40" y="50" width="140" height="120" rx="28"
        fill="#111111"/>

  <!-- 内层“屏幕区域”（弱层次，增强品牌质感） -->
  <rect x="55" y="65" width="110" height="90" rx="20"
        fill="#1c1c1c"/>

  <!-- 左侧品牌点（替代原UI刻度，更像 logo 识别点） -->
  <circle cx="70" cy="90" r="2.5" fill="#ffffff" opacity="0.35"/>
  <circle cx="70" cy="110" r="2.5" fill="#ffffff" opacity="0.35"/>
  <circle cx="70" cy="130" r="2.5" fill="#ffffff" opacity="0.35"/>

  <!-- 播放按钮（品牌核心视觉，略微放大增强识别） -->
  <path d="M98 88
           L98 132
           L140 110
           Z"
        fill="#ffffff"/>

</svg>